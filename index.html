<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            height: 100vh;
        }

        .card {
            border-radius: 20px;
        }

        .password-box {
            font-size: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="card p-4 shadow-lg" style="width: 450px;">
        <h2 class="mb-3">🔐 Password Generator</h2>

        <!-- Length -->
        <label>Password Length:</label>
        <input type="number" min="4" max="20" value="8" class="form-control mb-3" id="length">

        <!-- Options -->

        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="numbers" checked>
            <label>Include Numbers</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="uppercase" checked>
            <label>Include Uppercase</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="lowercase" checked>
            <label>Include Lowercase</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="symbols">
            <label>Include Special characters</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="exclude">
            <label>Exclude Ambiguous characters (e.g. O,0,l,1)</label>
        </div>

        <button class="btn btn-primary w-50 mb-3" onclick="generatePassword()">Generate</button>

        <!-- Password Output -->
        <input type="password" id="password" class="form-control text-center password-box mb-2" readonly>

        <!-- Show Password -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="showPassword" onchange="togglePassword()">
            <label>Show Password</label>
        </div>

        <!-- Strength Bar -->
        <div class="progress mb-3">
            <div id="strengthBar" class="progress-bar"></div>
        </div>

        <p class=" fw-bold" id="strengthText"></p>

        <button class="btn btn-success w-25 mb-2" onclick="copyPassword()">Copy</button>


    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById("length").value;

            let chars = "";
            let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let lower = "abcdefghijklmnopqrstuvwxyz";
            let numbers = "0123456789";
            let symbols = "!@#$%^&*()_+";

            if (document.getElementById("exclude").checked) {
                upper = upper.replace(/[O]/g, "");
                lower = lower.replace(/[l]/g, "");
                numbers = numbers.replace(/[01]/g, "");
            }

            if (document.getElementById("uppercase").checked) chars += upper;
            if (document.getElementById("lowercase").checked) chars += lower;
            if (document.getElementById("numbers").checked) chars += numbers;
            if (document.getElementById("symbols").checked) chars += symbols;

            if (chars === "") {
                alert("Select at least one option!");
                return;
            }

            let password = "";
            for (let i = 0; i < length; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }

            document.getElementById("password").value = password;

            checkStrength(password);
        }

        function togglePassword() {
            const field = document.getElementById("password");
            field.type = field.type === "password" ? "text" : "password";
        }

        function copyPassword() {
            const password = document.getElementById("password").value;

            if (!password) {
                alert("Generate password first!");
                return;
            }

            navigator.clipboard.writeText(password);
            alert("Copied!");
        }

        function checkStrength(password) {
            let strength = "Weak";
            let bar = document.getElementById("strengthBar");

            if (password.length >= 8) {
                strength = "Medium";
                bar.style.width = "60%";
                bar.className = "progress-bar bg-warning";
            }

            if (
                password.length >= 12 &&
                /[A-Z]/.test(password) &&
                /[0-9]/.test(password) &&
                /[^A-Za-z0-9]/.test(password)
            ) {
                strength = "Strong";
                bar.style.width = "100%";
                bar.className = "progress-bar bg-success";
            }

            if (password.length < 8) {
                bar.style.width = "30%";
                bar.className = "progress-bar bg-danger";
            }

            document.getElementById("strengthText").innerText = strength;
        }
    </script>

</body>

</html>
